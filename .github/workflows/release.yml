name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download ffmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $exe = Get-ChildItem -Path ffmpeg_tmp -Filter ffmpeg.exe -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName -Destination ffmpeg.exe
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg_tmp

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name AudioSplitter --add-binary "ffmpeg.exe;." main.py

      - name: Rename EXE
        shell: pwsh
        run: |
          Rename-Item dist\AudioSplitter.exe "AudioSplitter_${{ github.ref_name }}_windows.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist\AudioSplitter_*.exe
          generate_release_notes: true
